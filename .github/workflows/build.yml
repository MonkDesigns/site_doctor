# Site Doctor — CI build for all five targets.
# Place at .github/workflows/build.yml in the repository.
#
# Triggers on every push to main and on any tag starting with "v".
# Artifacts (downloadable builds) appear on each run's summary page:
#   repo -> Actions -> click the run -> Artifacts section.

name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the UI

jobs:
  linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest       # x64
            arch: x64
          - runner: ubuntu-24.04-arm    # ARM64 (free on public repos)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - run: flutter create . --platforms=linux --project-name site_doctor
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-linux-${{ matrix.arch }}
          path: build/linux/${{ matrix.arch }}/release/bundle/

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --platforms=android --project-name site_doctor
      - run: flutter build apk --release   # debug-keystore signed; fine for sideloading
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest    # x64
            arch: x64
          - runner: windows-11-arm    # ARM64 (public-preview runner, free on public repos)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --platforms=windows --project-name site_doctor
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-windows-${{ matrix.arch }}
          path: build/windows/${{ matrix.arch }}/runner/Release/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --platforms=macos --project-name site_doctor
      # Grant outbound-network entitlement (sandbox blocks sockets otherwise).
      - run: |
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f" || true
          done
      - run: flutter build macos --release
      # Flutter release .app is a universal binary; print slices to confirm.
      - run: lipo -info build/macos/Build/Products/Release/site_doctor.app/Contents/MacOS/site_doctor
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-macos-universal
          path: build/macos/Build/Products/Release/site_doctor.app

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --platforms=ios --project-name site_doctor
      # --no-codesign: compiles a full .app but skips Apple signing.
      # Installing on a device still requires signing with an Apple ID
      # (free, 7-day sideload) or a $99/yr developer account.
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-ios-unsigned
          path: build/ios/iphoneos/Runner.app
