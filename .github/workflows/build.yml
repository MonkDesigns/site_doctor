# Site Doctor — CI build for all targets/architectures.
# Artifacts: repo -> Actions -> click a run -> Artifacts section.

name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  linux:
    strategy:
      fail-fast: false           # one arch failing must not cancel the other
      matrix:
        include:
          - runner: ubuntu-latest       # x64
            arch: x64
          - runner: ubuntu-24.04-arm    # ARM64 (free on public repos)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      # Install Flutter from git (arch-agnostic; the tool bootstraps the
      # right Dart SDK for the host). Prebuilt SDK archives are x64-only.
      - run: |
          git clone -q -b stable --depth 1 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - run: flutter create . --platforms=linux --project-name site_doctor
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-linux-${{ matrix.arch }}
          path: build/linux/${{ matrix.arch }}/release/bundle/

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - run: |
          git clone -q -b stable --depth 1 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: flutter create . --platforms=android --project-name site_doctor
      - run: flutter build apk --release   # APK bundles arm32+arm64+x64
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest    # x64
            arch: x64
          - runner: windows-11-arm    # ARM64 (public-preview runner)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          git clone -q -b stable --depth 1 https://github.com/flutter/flutter.git C:\flutter
          Add-Content $env:GITHUB_PATH "C:\flutter\bin"
      - run: flutter create . --platforms=windows --project-name site_doctor
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-windows-${{ matrix.arch }}
          path: build/windows/${{ matrix.arch }}/runner/Release/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone -q -b stable --depth 1 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: flutter create . --platforms=macos --project-name site_doctor
      - run: |
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f" || true
          done
      - run: flutter build macos --release
      # Release .app is a universal binary; print slices to prove it.
      - run: lipo -info build/macos/Build/Products/Release/site_doctor.app/Contents/MacOS/site_doctor
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-macos-universal
          path: build/macos/Build/Products/Release/site_doctor.app

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone -q -b stable --depth 1 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: flutter create . --platforms=ios --project-name site_doctor
      - run: flutter build ios --release --no-codesign   # signing needed to install on device
      - uses: actions/upload-artifact@v4
        with:
          name: site_doctor-ios-unsigned
          path: build/ios/iphoneos/Runner.app

  # On tag pushes (v*), gather all build artifacts and attach them to a
  # public Release with plain download links.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, android, windows, macos, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Zip each artifact directory
        run: |
          cd dist
          for d in */; do
            n="${d%/}"
            if [ -f "$n"/*.apk ] 2>/dev/null || ls "$n"/*.apk >/dev/null 2>&1; then
              mv "$n"/*.apk "$n.apk"
            else
              (cd "$n" && zip -qr "../$n.zip" .)
            fi
          done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.apk
